[project]
name = "showrunner"
version = "0.1.0"
description = "A collection of tools for live performances including script parsing, cue management, and more."
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["fastapi>=0.135.2", "pluggy>=1.6.0"]

[project.scripts]
sr = "showrunner.app:main"

[build-system]
requires = ["uv_build>=0.11.2,<0.12"]
build-backend = "uv_build"
