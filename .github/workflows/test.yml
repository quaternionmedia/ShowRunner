name: 🧪 Tests
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - '*'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    name: ⚗️ pytest
    runs-on: ubuntu-latest
    steps:
    - name: 📰 Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: 😎 Install uv
      uses: astral-sh/setup-uv@v7

    - name: 📦 Sync dependencies
      run: uv sync

    - name: 🧫 Run tests
      run: uv run pytest
