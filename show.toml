[showrunner]
current-show = 1

[database]
# path = "show.db"
# echo = false

[server]
# host = "0.0.0.0"
# port = 8000
# storage-secret = "showrunner"

[logging]
# level = "INFO"

[paths]
# scripts = "./scripts"
exports = "./exports"

[plugins]
# disabled = []

# ---------------------------------------------------------------------------
# ShowRecorder — OBS websocket v5 screen recording control
# Enable in OBS: Tools → WebSocket Server Settings → Enable WebSocket server
# ---------------------------------------------------------------------------
[plugins.recorder]
obs-host = "localhost"
obs-port = 4455
obs-password = ""        # set to match OBS WebSocket server password

# ---------------------------------------------------------------------------
# ShowMixer — Ardour OSC transport control
# Enable in Ardour: Edit → Preferences → Control Surfaces → OSC → Enable
# ---------------------------------------------------------------------------
[plugins.mixer]
ardour-host = "localhost"
ardour-osc-port = 3819

# ---------------------------------------------------------------------------
# ShowProgrammer — OSC cue dispatcher (QLab equivalent)
# Lists every OSC target that cues will broadcast to when fired.
# ---------------------------------------------------------------------------
[plugins.programmer]
osc-targets = [
  { host = "localhost", port = 3819 },   # Ardour
]

# ---------------------------------------------------------------------------
# ShowVoicer — Kokoro TTS voice-over generation
# Voices: af_heart, af_bella, am_adam, bf_emma (British), etc.
# Model weights (~300 MB) download automatically on first use.
# ---------------------------------------------------------------------------
[plugins.voicer]
voice = "af_heart"
speed = 1.0
output-dir = "./exports/narration"

